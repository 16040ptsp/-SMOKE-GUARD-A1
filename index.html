<!doctype html>
<html lang='th'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>SMOKE GUARD A1 - โรงเรียนพานทองสภาชนูปถัมภ์</title>
    <script src='https://cdn.tailwindcss.com/3.4.17'></script>
    <script src='https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js'></script>
    <link rel='stylesheet' href='style.css'>
</head>
<body class='bg-slate-100'>
    <div class='app-shell justify-center items-center'>
        <div class='bg-white p-8 rounded-3xl border border-slate-200 shadow-xl max-w-md w-full text-center relative z-10'>
            <img src='images.jpg' alt='ตราโรงเรียน' class='w-32 h-32 mx-auto mb-4 object-contain'>
            
            <h2 class='text-xl font-bold text-slate-800 mb-1'>โรงเรียนพานทองสภาชนูปถัมภ์</h2>
            <p class='text-sm text-slate-500 mb-6'>ระบบโครงงานสิ่งประดิษฐ์ SMOKE GUARD A1</p>
            
            <hr class='border-slate-100 mb-6'>
            <p class='text-sm font-semibold text-slate-600 mb-3 text-left'>กรุณาเลือกสถานะการเข้าใช้งาน:</p>
            
            <div class='space-y-3'>
                <a href='user.html' class='w-full bg-blue-50 text-blue-600 font-bold p-4 rounded-xl flex items-center justify-between border border-blue-200 hover:bg-blue-100 transition-all active:scale-[0.99]'>
                    <span class='flex items-center gap-3'><i data-lucide='users' width='20' height='20'></i> User ทั่วไป</span>
                    <i data-lucide='chevron-right' width='18' height='18'></i>
                </a>
                
                <button onclick='showAdminLogin()' class='w-full bg-slate-900 text-white font-bold p-4 rounded-xl flex items-center justify-between border border-slate-800 hover:bg-slate-800 transition-all active:scale-[0.99]'>
                    <span class='flex items-center gap-3'><i data-lucide='shield-alert' width='20' height='20'></i> Admin ผู้ดูแลระบบ</span>
                    <i data-lucide='chevron-right' width='18' height='18'></i>
                </button>
            </div>

            <div id='admin-form' class='hidden mt-4 p-4 bg-slate-50 rounded-xl border border-slate-200 text-left'>
                <label class='block text-xs font-bold text-slate-600 mb-1'>รหัสผ่านแอดมิน:</label>
                <div class='flex gap-2'>
                    <input type='password' id='admin-password' placeholder='กรอกรหัสผ่านประจำกลุ่ม' class='w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none'>
                    <button onclick='verifyAdmin()' class='bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-emerald-700'>ยืนยัน</button>
                </div>
                <p id='login-error' class='text-xs text-red-500 mt-1 hidden'>❌ รหัสผ่านไม่ถูกต้อง</p>
            </div>
        </div>
    </div>

    <script>
        function showAdminLogin() {
            document.getElementById('admin-form').classList.toggle('hidden');
        }
        function verifyAdmin() {
            let pass = document.getElementById('admin-password').value;
            if(pass === '1234') { // ถ้ารหัสผ่านถูก ให้ลิงก์ไปหน้า admin.html
                window.location.href = 'admin.html';
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }
        lucide.createIcons();
    </script>
</body>
</html>
