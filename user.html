<!doctype html>
<html lang='th'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>SMOKE GUARD A1 - โหมดบุคคลทั่วไป</title>
    <script src='https://cdn.tailwindcss.com/3.4.17'></script>
    <script src='https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js'></script>
    <link rel='stylesheet' href='style.css'>
</head>
<body class='bg-slate-100'>
    <div class='app-shell'>
        <header class='dashboard-wrap'>
            <div class='flex items-center justify-between mb-4 relative z-10'>
                <a href='index.html' class='flex items-center gap-2 text-xs font-bold text-slate-500 bg-white border border-slate-200 px-3 py-1.5 rounded-xl hover:bg-slate-50'>
                    <i data-lucide='arrow-left' width='14' height='14'></i> กลับหน้าแรก
                </a>
                <span class='text-xs font-bold px-3 py-1 rounded-full bg-blue-50 text-blue-600'>👤 บุคคลทั่วไป (User)</span>
            </div>
        </header>
        
        <main class='dashboard-wrap'>
            <section class='bg-white dashboard-panel'>
                <div class='p-[30px_30px_25px] text-center border-b border-slate-200 relative'>
                    <h1 class='font-bold text-2xl m-0 flex items-center justify-center'>SMOKE GUARD A1</h1>
                    <p class='text-gray-500 mt-2 mb-0 text-sm'>ระบบเฝ้าระวังและตรวจจับควันอัจฉริยะ (โรงเรียนพานทองสภาชนูปถัมภ์)</p>
                    <div class='flex justify-center mt-3'>
                        <div id='status-pill' class='inline-flex items-center gap-2 rounded-full p-[7px_13px] text-xs font-bold' style='background:#e5f8ef; color:#188d58;'>
                            <span id='status-text'>🟢 คุณภาพอากาศปกติ</span>
                        </div>
                    </div>
                </div>
                
                <section class='sensor-grid'>
                    <article class='sensor-card bg-orange-50 p-5 rounded-2xl flex flex-col'>
                        <h2 class='font-bold text-slate-700 text-sm m-0'>ปริมาณฝุ่น PM 2.5</h2>
                        <p class='font-bold text-4xl text-orange-600 mt-2'><span id='pm-value'>--</span><span class='text-sm font-semibold ml-1'>µg/m³</span></p>
                    </article>
                    <article class='sensor-card bg-emerald-50 p-5 rounded-2xl flex flex-col'>
                        <h2 class='font-bold text-slate-700 text-sm m-0'>ความหนาแน่นแก๊ส</h2>
                        <p class='font-bold text-4xl text-emerald-600 mt-2'><span id='gas-value'>--</span></p>
                    </article>
                    <article class='sensor-card bg-blue-50 p-5 rounded-2xl flex flex-col'>
                        <h2 class='font-bold text-slate-700 text-sm m-0'>อุณหภูมิห้อง</h2>
                        <p class='font-bold text-4xl text-blue-600 mt-2'><span id='temp-value'>--</span><span class='text-sm font-semibold ml-1'>°C</span></p>
                    </article>
                </section>
                
                <div class='border-t border-slate-200 p-[18px_24px_23px] text-xs text-slate-500'>
                    <span>อัปเดตล่าสุด: </span><time id='updated-time'>--:--:--</time>
                </div>
            </section>
        </main>
    </div>

    <script>
        function updateData() {
    // 🚨 เป็น IP ที่ขึ้นบนจอบอร์ด IPST 
    fetch('http://192.168.1.123/data') 
        .then(res => res.json())
        .then(data => {
            document.getElementById('pm-value').innerText = data.pm25;
            document.getElementById('gas-value').innerText = data.gas;
            document.getElementById('temp-value').innerText = data.temp;
            
            let pill = document.getElementById('status-pill');
            let txt = document.getElementById('status-text');
            if(data.pm25 >= 150){
                txt.innerText = '⚠️ คุณภาพอากาศอันตราย';
                pill.style.background = '#ffe3e5'; pill.style.color = '#dd3445';
            } else if(data.pm25 >= 81){
                txt.innerText = '🟠 เฝ้าระวังคุณภาพอากาศ';
                pill.style.background = '#fff1d8'; pill.style.color = '#b86d00';
            } else {
                txt.innerText = '🟢 คุณภาพอากาศปกติ';
                pill.style.background = '#e5f8ef'; pill.style.color = '#188d58';
            }
            document.getElementById('updated-time').innerText = new Date().toLocaleTimeString('th-TH');
        })
        .catch(err => {
            console.error(err);
            document.getElementById('status-text').innerText = '⏳ กำลังรอข้อมูลจากบอร์ด...';
        });
}
updateData();
setInterval(updateData, 1000);
lucide.createIcons();
    </script>
</body>
</html>
